<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#f0f8f0" rx="12"/>
  <!-- Argentina flag colors background strip -->
  <rect x="20" y="20" width="160" height="30" fill="#74acdf"/>
  <rect x="20" y="50" width="160" height="30" fill="#ffffff"/>
  <rect x="20" y="80" width="160" height="30" fill="#74acdf"/>
  <!-- Sun of May on flag -->
  <circle cx="100" cy="65" r="14" fill="#F6B40E" stroke="#85340A" stroke-width="1"/>
  <!-- Sun rays -->
  <g fill="#F6B40E" stroke="#85340A" stroke-width="0.8">
    <line x1="100" y1="46" x2="100" y2="42"/>
    <line x1="100" y1="84" x2="100" y2="88"/>
    <line x1="81" y1="65" x2="77" y2="65"/>
    <line x1="119" y1="65" x2="123" y2="65"/>
    <line x1="87" y1="52" x2="84" y2="49"/>
    <line x1="113" y1="78" x2="116" y2="81"/>
    <line x1="113" y1="52" x2="116" y2="49"/>
    <line x1="87" y1="78" x2="84" y2="81"/>
  </g>
  <!-- Female symbol -->
  <circle cx="80" cy="140" r="22" fill="none" stroke="#9b59b6" stroke-width="4"/>
  <line x1="80" y1="162" x2="80" y2="178" stroke="#9b59b6" stroke-width="4"/>
  <line x1="68" y1="170" x2="92" y2="170" stroke="#9b59b6" stroke-width="4"/>
  <!-- Scale/balance (bargaining power) -->
  <line x1="130" y1="118" x2="130" y2="175" stroke="#e67e22" stroke-width="3"/>
  <line x1="112" y1="128" x2="148" y2="128" stroke="#e67e22" stroke-width="3"/>
  <!-- Left tray up (empowered) -->
  <line x1="112" y1="128" x2="112" y2="138" stroke="#e67e22" stroke-width="2"/>
  <ellipse cx="112" cy="138" rx="10" ry="4" fill="#e67e22" opacity="0.7"/>
  <!-- Right tray balanced -->
  <line x1="148" y1="128" x2="148" y2="145" stroke="#e67e22" stroke-width="2"/>
  <ellipse cx="148" cy="145" rx="10" ry="4" fill="#e67e22" opacity="0.7"/>
  <!-- Coin on left tray -->
  <circle cx="112" cy="134" r="5" fill="#F6B40E" stroke="#85340A" stroke-width="1"/>
  <text x="100" y="193" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">AUH &amp; Bargaining Power</text>
</svg>
